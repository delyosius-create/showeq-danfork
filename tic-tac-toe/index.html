<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1020">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tic-Tac-Toe</title>
<style>
  :root {
    --bg: #0f1020;
    --panel: #1a1c33;
    --line: #2c2f52;
    --x: #ff5d73;
    --o: #5ad1e6;
    --text: #e7e9f5;
    --muted: #9aa0c4;
    --accent: #7c5cff;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
    touch-action: manipulation;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: calc(env(safe-area-inset-top) + 12px) 16px calc(env(safe-area-inset-bottom) + 12px);
    min-height: 100dvh;
  }

  h1 {
    margin: 0 0 4px;
    font-size: clamp(1.6rem, 7vw, 2.4rem);
    letter-spacing: 1px;
    text-align: center;
  }

  .status {
    font-size: clamp(1rem, 4.5vw, 1.25rem);
    color: var(--muted);
    min-height: 1.5em;
    margin-bottom: 14px;
    text-align: center;
    font-weight: 600;
  }
  .status .x { color: var(--x); }
  .status .o { color: var(--o); }

  .board {
    width: min(86vw, 360px);
    aspect-ratio: 1 / 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 10px;
    background: var(--panel);
    padding: 10px;
    border-radius: 18px;
    box-shadow: 0 12px 40px rgba(0,0,0,.45);
  }

  /* When locked, let the board grow to use the full screen. */
  body.locked .board { width: min(92vw, 92vh, 560px); }

  .cell {
    background: var(--bg);
    border: none;
    border-radius: 12px;
    font-size: clamp(2.5rem, 16vw, 6rem);
    font-weight: 800;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform .08s ease, background .15s ease;
  }
  .cell:active { transform: scale(.95); }
  .cell.x { color: var(--x); }
  .cell.o { color: var(--o); }
  .cell.win { background: var(--accent); color: #fff; animation: pop .3s ease; }
  .cell:disabled { cursor: default; }

  @keyframes pop {
    0% { transform: scale(.6); }
    60% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  .controls {
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: min(86vw, 360px);
  }

  .modes {
    display: flex;
    gap: 8px;
    background: var(--panel);
    padding: 6px;
    border-radius: 12px;
  }
  .modes button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
  }
  .modes button.active { background: var(--accent); color: #fff; }

  .row { display: flex; gap: 12px; }

  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: var(--panel);
    color: var(--text);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
  }
  .btn:active { transform: scale(.97); }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.lock { background: #243a2a; color: #8ff0a4; }

  .scores {
    display: flex;
    justify-content: space-between;
    width: min(86vw, 360px);
    margin-bottom: 12px;
    gap: 10px;
  }
  .score {
    flex: 1;
    background: var(--panel);
    border-radius: 12px;
    padding: 8px 4px;
    text-align: center;
  }
  .score .label { font-size: .75rem; color: var(--muted); font-weight: 700; }
  .score .val { font-size: 1.4rem; font-weight: 800; }
  .score.x .val { color: var(--x); }
  .score.o .val { color: var(--o); }

  /* Hide everything except the board + the in-game lock pad while locked. */
  body.locked h1,
  body.locked .scores,
  body.locked .controls { display: none; }

  /* Small unlock pad shown only while locked (hold to exit). */
  .lockpad {
    display: none;
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 10px);
    right: calc(env(safe-area-inset-right) + 10px);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--panel);
    color: var(--muted);
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    z-index: 30;
    overflow: hidden;
    cursor: pointer;
  }
  body.locked .lockpad { display: flex; }
  /* Radial fill that grows during the hold-to-unlock gesture. */
  .lockpad .fill {
    position: absolute;
    inset: 0;
    background: conic-gradient(var(--accent) var(--p, 0deg), transparent 0deg);
    opacity: .9;
  }
  .lockpad .glyph { position: relative; z-index: 1; }

  /* Replay button while locked. */
  .lock-replay {
    display: none;
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 10px);
    left: calc(env(safe-area-inset-left) + 10px);
    padding: 12px 18px;
    border: none;
    border-radius: 28px;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    font-weight: 800;
    z-index: 30;
    cursor: pointer;
  }
  body.locked .lock-replay { display: block; }

  /* Full-screen shield: if the OS drops us out of fullscreen while
     locked, this covers the game until a parent/child taps to resume. */
  .shield {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    color: var(--text);
    z-index: 40;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 24px;
  }
  .shield.show { display: flex; }
  .shield .big { font-size: 3rem; }
  .shield .msg { font-size: 1.2rem; font-weight: 700; color: var(--muted); }

  .hint {
    font-size: .8rem;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div class="status" id="status"></div>

  <div class="scores">
    <div class="score x"><div class="label" id="labelX">Player X</div><div class="val" id="scoreX">0</div></div>
    <div class="score"><div class="label">Draws</div><div class="val" id="scoreD">0</div></div>
    <div class="score o"><div class="label" id="labelO">Player O</div><div class="val" id="scoreO">0</div></div>
  </div>

  <div class="board" id="board"></div>

  <div class="controls">
    <div class="modes" id="modes">
      <button data-mode="2p" class="active">2 Players</button>
      <button data-mode="easy">vs Easy</button>
      <button data-mode="hard">vs Hard</button>
    </div>
    <div class="row">
      <button class="btn" id="resetScores">Reset Score</button>
      <button class="btn primary" id="newGame">New Game</button>
    </div>
    <div class="row">
      <button class="btn lock" id="lockBtn">🔒 Kids Lock</button>
    </div>
    <div class="hint">Kids Lock hides the menus and goes full-screen.<br>To exit: hold the 🔓 button (bottom-right) for 3 seconds.</div>
  </div>

  <!-- Shown only while locked -->
  <button class="lock-replay" id="lockReplay">↻ New Game</button>
  <div class="lockpad" id="lockpad" title="Hold to unlock">
    <div class="fill" id="lockFill"></div>
    <div class="glyph">🔓</div>
  </div>

  <!-- Resume shield (re-enters fullscreen if the OS exits it while locked) -->
  <div class="shield" id="shield">
    <div class="big">🔒</div>
    <div class="msg">Tap to keep playing</div>
  </div>

<script>
(function () {
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  const boardEl   = document.getElementById('board');
  const statusEl  = document.getElementById('status');
  const scoreXEl  = document.getElementById('scoreX');
  const scoreOEl  = document.getElementById('scoreO');
  const scoreDEl  = document.getElementById('scoreD');
  const labelOEl  = document.getElementById('labelO');
  const shieldEl  = document.getElementById('shield');
  const lockpadEl = document.getElementById('lockpad');
  const lockFillEl= document.getElementById('lockFill');

  let board, current, gameOver, mode = '2p';
  let scores = { X: 0, O: 0, D: 0 };
  let locked = false;

  const cells = [];
  for (let i = 0; i < 9; i++) {
    const b = document.createElement('button');
    b.className = 'cell';
    b.dataset.index = i;
    b.addEventListener('click', () => onCellClick(i));
    boardEl.appendChild(b);
    cells.push(b);
  }

  function newGame() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    cells.forEach(c => {
      c.textContent = '';
      c.disabled = false;
      c.className = 'cell';
    });
    renderStatus();
  }

  function renderStatus() {
    if (gameOver) return;
    const who = current === 'X' ? '<span class="x">X</span>' : '<span class="o">O</span>';
    if (mode !== '2p' && current === 'O') {
      statusEl.innerHTML = 'Computer is thinking…';
    } else {
      statusEl.innerHTML = `Turn: ${who}`;
    }
  }

  function onCellClick(i) {
    if (gameOver || board[i]) return;
    if (mode !== '2p' && current === 'O') return;
    move(i, current);
    if (!gameOver && mode !== '2p' && current === 'O') {
      setTimeout(aiMove, 350);
    }
  }

  function move(i, player) {
    board[i] = player;
    cells[i].textContent = player;
    cells[i].classList.add(player.toLowerCase());
    cells[i].disabled = true;

    const result = evaluate(board);
    if (result) { endGame(result); return; }
    current = current === 'X' ? 'O' : 'X';
    renderStatus();
  }

  function endGame(result) {
    gameOver = true;
    if (result.winner) {
      result.line.forEach(idx => cells[idx].classList.add('win'));
      const who = result.winner === 'X' ? '<span class="x">X</span>' : '<span class="o">O</span>';
      statusEl.innerHTML = (mode !== '2p')
        ? (result.winner === 'X' ? 'You win! 🎉' : 'Computer wins 🤖')
        : `${who} wins! 🎉`;
      scores[result.winner]++;
    } else {
      statusEl.textContent = "It's a draw 🤝";
      scores.D++;
    }
    cells.forEach(c => c.disabled = true);
    updateScores();
  }

  function updateScores() {
    scoreXEl.textContent = scores.X;
    scoreOEl.textContent = scores.O;
    scoreDEl.textContent = scores.D;
  }

  function evaluate(b) {
    for (const line of WINS) {
      const [a, c, d] = line;
      if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line };
    }
    if (b.every(v => v)) return { winner: null, draw: true };
    return null;
  }

  // ---- AI ----
  function aiMove() {
    if (gameOver) return;
    const idx = (mode === 'easy')
      ? (Math.random() < 0.5 ? bestMove('O') : randomMove())
      : bestMove('O');
    move(idx, 'O');
  }

  function randomMove() {
    const open = board.map((v, i) => v ? null : i).filter(v => v !== null);
    return open[Math.floor(Math.random() * open.length)];
  }

  function bestMove(player) {
    const opp = player === 'O' ? 'X' : 'O';
    let bestScore = -Infinity, bestIdx = -1;
    for (let i = 0; i < 9; i++) {
      if (board[i]) continue;
      board[i] = player;
      const score = minimax(board, 0, false, player, opp);
      board[i] = '';
      if (score > bestScore) { bestScore = score; bestIdx = i; }
    }
    return bestIdx;
  }

  function minimax(b, depth, isMax, me, opp) {
    const res = evaluate(b);
    if (res) {
      if (res.winner === me) return 10 - depth;
      if (res.winner === opp) return depth - 10;
      return 0;
    }
    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (b[i]) continue;
        b[i] = me; best = Math.max(best, minimax(b, depth + 1, false, me, opp)); b[i] = '';
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (b[i]) continue;
        b[i] = opp; best = Math.min(best, minimax(b, depth + 1, true, me, opp)); b[i] = '';
      }
      return best;
    }
  }

  // ---- Mode buttons ----
  document.getElementById('modes').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    mode = btn.dataset.mode;
    [...e.currentTarget.children].forEach(c => c.classList.toggle('active', c === btn));
    labelOEl.textContent = mode === '2p' ? 'Player O' : 'Computer';
    newGame();
  });

  document.getElementById('newGame').addEventListener('click', newGame);
  document.getElementById('lockReplay').addEventListener('click', newGame);
  document.getElementById('resetScores').addEventListener('click', () => {
    scores = { X: 0, O: 0, D: 0 };
    updateScores();
  });

  // =================== KIDS LOCK / KIOSK ===================
  function requestFullscreen() {
    const el = document.documentElement;
    const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (fn) { try { fn.call(el); } catch (e) {} }
  }
  function exitFullscreen() {
    const fn = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      if (fn) { try { fn.call(document); } catch (e) {} }
    }
  }
  function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }

  // Keep the screen awake while locked (best effort).
  let wakeLock = null;
  async function acquireWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
  }
  function releaseWakeLock() {
    try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (e) {}
  }

  function lock() {
    locked = true;
    document.body.classList.add('locked');
    requestFullscreen();
    acquireWakeLock();
  }

  function unlock() {
    locked = false;
    document.body.classList.remove('locked');
    shieldEl.classList.remove('show');
    exitFullscreen();
    releaseWakeLock();
  }

  document.getElementById('lockBtn').addEventListener('click', lock);

  // If the OS drops fullscreen while locked, raise the resume shield.
  function onFsChange() {
    if (locked && !isFullscreen()) shieldEl.classList.add('show');
    if (locked && isFullscreen()) shieldEl.classList.remove('show');
  }
  document.addEventListener('fullscreenchange', onFsChange);
  document.addEventListener('webkitfullscreenchange', onFsChange);

  // Tapping the shield re-enters fullscreen (needs a user gesture).
  shieldEl.addEventListener('click', () => {
    requestFullscreen();
    acquireWakeLock();
    shieldEl.classList.remove('show');
  });

  // Re-arm the wake lock when returning to the tab while locked.
  document.addEventListener('visibilitychange', () => {
    if (locked && document.visibilityState === 'visible') acquireWakeLock();
  });

  // ---- Hold-to-unlock gesture (3 seconds) ----
  const HOLD_MS = 3000;
  let holdStart = 0, holdRAF = 0;

  function holdTick(now) {
    const elapsed = now - holdStart;
    const pct = Math.min(elapsed / HOLD_MS, 1);
    lockFillEl.style.setProperty('--p', (pct * 360) + 'deg');
    if (pct >= 1) { endHold(); unlock(); return; }
    holdRAF = requestAnimationFrame(holdTick);
  }
  function startHold(e) {
    e.preventDefault();
    holdStart = performance.now();
    holdRAF = requestAnimationFrame(holdTick);
  }
  function endHold() {
    cancelAnimationFrame(holdRAF);
    lockFillEl.style.setProperty('--p', '0deg');
  }
  lockpadEl.addEventListener('touchstart', startHold, { passive: false });
  lockpadEl.addEventListener('mousedown', startHold);
  ['touchend','touchcancel','mouseup','mouseleave'].forEach(ev =>
    lockpadEl.addEventListener(ev, endHold));

  // ---- Hardening against accidental exits ----
  // Block the context / long-press menu.
  document.addEventListener('contextmenu', e => { if (locked) e.preventDefault(); });
  // Block pinch-zoom gestures.
  document.addEventListener('gesturestart', e => { if (locked) e.preventDefault(); });
  // Warn before a refresh / close while locked.
  window.addEventListener('beforeunload', e => {
    if (locked) { e.preventDefault(); e.returnValue = ''; }
  });

  updateScores();
  newGame();
})();
</script>
</body>
</html>
